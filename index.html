<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💝</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" href="waiting.webp" as="image">
    <link rel="preload" href="yes.webp" as="image">
    <link rel="stylesheet" href="loader.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-container">
            <div class="paper-heart"></div>
            <div class="paper-heart-inner"></div>
        </div>
        <div class="loading-text">Loading Love...</div>
    </div>
    <script src="loader.js"></script>
    <div class="container">
        <h1>Hey You!! sayangg akuu</h1>
        <h2>cuma mau bilang kalau aku sayang banget sama kamu, hari ini, besok, dan seterusnya</h2>
        <div class="buttons">
            <button class="yes-button" onclick="handleYesClick()">Yes</button>
            <button class="no-button" onclick="handleNoClick()">No</button>
        </div>
        <div class="gif_container">
            <img src="waiting.webp" alt="Euis">

        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script> <audio id="bgMusic" autoplay loop>
    <source src="lagu.mp3" type="audio/mpeg">
</audio>
<script>
document.addEventListener("click", function () {
    document.getElementById("bgMusic").play();
}, { once: true });
</script>
</body>
</html>
